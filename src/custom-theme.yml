toc:
  title:
    font_color: 004466
    font_size: 20
    font_style: bold
    margin_bottom: 24
  # Estilo para los capítulos principales (Nivel 1)
  h1:
    font_style: bold
    font_color: 004466
  # Estilo para los subcapítulos (Nivel 2, como el 1.1)
  h2:
    font_size: 10
    font_color: 555555
    indent: 15
  # Personalizamos los puntitos
  dot_leader:
    content: " . "  # Añadimos un espacio entre puntos para que sea más ligero
  line_height: 1.6
font:
  catalog:
    Roboto:
      normal: Roboto-Regular.ttf
      bold: Roboto-Bold.ttf
      italic: Roboto-Italic.ttf
      bold_italic: Roboto-BoldItalic.ttf
  fallbacks:
    - Roboto
page:
  layout: portrait
  margin: [0.75in, 1in, 0.75in, 1in]
base:
  font_family: Roboto
  font_size: 11
  font_color: 222222
  line_height: 1.4
  line_height_length: 16
vertical_spacing: 18
heading:
  font_family: Roboto
  font_color: 004466
  font_style: bold
  margin_top: 40
  margin_bottom: 16
prose:
  margin_bottom: 12